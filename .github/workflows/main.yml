name: Build PhoneAIOS APK

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    - name: Build with Gradle
      run: ./gradlew assembleDebug

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: PhoneAIOS-debug
        path: app/build/outputs/apk/debug/app-debug.apk

    - name: Create Issue on Build Failure
      if: failure()
      run: |
        gh issue create --title "Build Failure: ${{ github.sha }}" --body "The latest build failed. Check logs: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
      env:
        GH_TOKEN: ${{ android.app.src.main.res.values.strings.xml }} # Placeholder or user token
